<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VieFolio | Bring your portfolio to life.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .glow-text {
            background: linear-gradient(to right, #3b82f6, #8b5cf6, #ec4899);
            -webkit-text-fill-color: transparent;
            animation: pulse 3s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.5)); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-blue-500/20 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="z-10 text-center px-4">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/5 border border-white/10 text-sm font-medium text-gray-300 mb-8">
            <span class="w-2 h-2 rounded-full bg-blue-500 animate-ping"></span>
            <span class="w-2 h-2 rounded-full bg-blue-500 absolute"></span>
            System in development
        </div>

        <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter mb-6">
            <span class="glow-text">VieFolio</span>
        </h1>
        
        <p class="text-xl md:text-2xl text-gray-400 max-w-2xl mx-auto font-light leading-relaxed">
            Bring your portfolio to life. The ultimate dynamic showcase for developers and creators.
        </p>

        <div class="mt-12 text-gray-500 text-sm">
            <p>Launching soon. Preparing the infrastructure...</p>
        </div>
    </div>

</body>
</html>
